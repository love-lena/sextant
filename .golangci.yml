version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
  exclusions:
    rules:
      # gosec on test code is overwhelmingly false-positive: hardcoded
      # test creds, WriteFile to t.TempDir() with 0o644, exec.Command
      # with test-controlled args. Excluded across *_test.go so the
      # production gosec rules stay live where they matter.
      - path: _test\.go
        linters: [gosec]

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/love-lena/sextant

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
