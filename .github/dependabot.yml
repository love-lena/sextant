# Dependabot config — version-update + security-update PRs
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Go modules
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "go"
    commit-message:
      prefix: "deps(go)"
    # Group patch + minor bumps so the PR list stays manageable.
    groups:
      go-deps:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # NPM workspaces (clients/typescript + images/sidecar/entrypoint)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"
    groups:
      npm-deps:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
          - "major"
