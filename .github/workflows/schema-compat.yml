name: schema-compat

# The AUTHORING limb of the WireEpoch compatibility check (control-plane
# RFC §5.8). Sibling to `changelog entry required`: that gate guards the
# human-facing contract, this one guards the bus WIRE contract. Both are
# mechanical.
#
# It regenerates the JSON schemas from the current Go source, asserts the
# committed schemas are in sync (a forgotten `go generate` fails here), then
# diffs them against the PR's base-ref schemas. If a BREAKING wire change
# landed (removed/renamed field, type change, optional→required, removed
# enum value) without a sextantproto.WireEpoch bump, the build FAILS.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-compat:
    name: wire schema-compat (WireEpoch gate)
    runs-on: ubuntu-24.04
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: regenerate schemas + assert committed copy is in sync
        run: |
          set -euo pipefail
          go run ./cmd/sextantproto-gen -out pkg/sextantproto/schemas
          if ! git diff --exit-code pkg/sextantproto/schemas; then
            echo "::error::pkg/sextantproto/schemas is out of sync with the Go source; run 'go generate ./pkg/sextantproto/...' and commit"
            exit 1
          fi

      - name: materialize the base-ref schema snapshot
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/base-schemas
          # Extract every committed schema at the merge base into a flat dir.
          for f in $(git ls-tree -r --name-only "$BASE_SHA" -- pkg/sextantproto/schemas); do
            git show "$BASE_SHA:$f" > "/tmp/base-schemas/$(basename "$f")"
          done
          ls -1 /tmp/base-schemas

      - name: run the WireEpoch compatibility gate
        run: |
          go run ./cmd/sextant-schema-compat \
            -old /tmp/base-schemas \
            -new pkg/sextantproto/schemas
