name: mdbook

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - ".github/workflows/mdbook.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/book/**"
      - ".github/workflows/mdbook.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build mdbook
    runs-on: ubuntu-24.04
    env:
      MDBOOK_VERSION: 0.5.3
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install mdbook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Regenerate the generated pages from canon and fail if they drift from
      # what's committed — the docs can't silently fall out of sync with
      # protocol/ or the SDK (the same up-to-date guard the TS codegen uses).
      - name: docgen (no drift)
        run: |
          go run ./cmd/docgen
          git diff --exit-code -- docs/book/src docs/book/generated \
            || { echo "::error::generated docs are stale — run 'make book' and commit"; exit 1; }

      - name: mdbook build
        working-directory: docs/book
        run: mdbook build

      # Deploy artifacts only on push to main. PR runs validate the build
      # but don't publish.
      - uses: actions/configure-pages@v6
        if: github.event_name == 'push'

      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push'
        with:
          path: docs/book/book

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
