name: Release

# Pushing a v* tag publishes a GitHub release whose tarballs are complete,
# versioned installs — binaries + the Claude Code plugin (TASK-47). Dogfood
# machines upgrade by release, never by branch state. After publishing, the
# release also opens a PR bumping the Homebrew formula to the new version +
# fresh sha256s (TASK-59), so `brew upgrade` tracks releases.
on:
  push:
    tags: ['v*']

# contents: write to create the release + push the bump branch.
# pull-requests: write to open + auto-merge the formula-bump PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # release.sh regenerates the dash UI bundles (TASK-121) via esbuild, which
      # needs Node/npx; they're generated, not committed.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: build tarballs
        run: scripts/release.sh "$GITHUB_REF_NAME"
      - name: smoke the linux binary
        run: |
          tar -xzf "dist/sextant_${GITHUB_REF_NAME}_linux_amd64.tar.gz" -C /tmp
          v=$(/tmp/sextant_${GITHUB_REF_NAME}_linux_amd64/bin/sextant version)
          echo "$v"
          case "$v" in "sextant ${GITHUB_REF_NAME} ("*) ;; *) echo "version not stamped"; exit 1 ;; esac
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        # A hyphen in the tag (v0.2.0-rc.1) is a semver prerelease — published
        # flagged, never as "latest".
        run: |
          pre=""
          case "$GITHUB_REF_NAME" in *-*) pre="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz --generate-notes --verify-tag $pre

      # Regenerate Formula/sextant.rb from the dist tarballs we just built and
      # open a bump PR to main. Branch protection on main (required check
      # "lint + test (Go)", linear history, enforce_admins) means a workflow
      # cannot push straight to main, and a PR created with the default
      # GITHUB_TOKEN does NOT trigger the required check — so it can't auto-merge
      # on the token alone. To make auto-merge fire hands-off, configure a
      # fine-grained PAT secret HOMEBREW_BUMP_TOKEN (Contents: read/write,
      # Pull requests: read/write, Workflows: read/write on this repo) whose
      # push triggers CI. Absent the PAT, the PR is still opened with the
      # default token and the operator merges it with one click.
      - name: bump Homebrew formula (prerelease tags skip — only "latest" gets a formula)
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          # Prefer the PAT (its pushes trigger CI → auto-merge can fire);
          # fall back to the default token (opens the PR, no auto-merge).
          GH_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN || github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          branch="homebrew-bump-${tag}"

          scripts/gen-formula.sh "$tag" > /dev/null
          if git diff --quiet -- Formula/sextant.rb; then
            echo "formula already at ${tag}; nothing to bump"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"   # -B: reset-or-create, idempotent on re-runs
          git add Formula/sextant.rb
          git commit -m "chore(release): bump Homebrew formula to ${tag} (TASK-59)"
          git push --force-with-lease origin "$branch"

          # Open the PR (idempotent: reuse an existing open PR for this branch).
          # The body is assembled with printf so the YAML stays single-line per
          # source line (a raw newline at column 0 would end the block scalar).
          body=$(printf '%s\n\n%s\n' \
            "Automated formula bump for **${tag}** (TASK-59): new \`version\` + the four per-platform sha256s, regenerated by \`scripts/gen-formula.sh\` from the release tarballs." \
            "Auto-merge is enabled below; it fires once the required \`lint + test (Go)\` check passes. That check only runs if this branch was pushed by a PAT (\`HOMEBREW_BUMP_TOKEN\`) — pushes from the default \`GITHUB_TOKEN\` do not trigger workflows, so without the PAT this PR waits for a one-click manual merge.")

          if ! url=$(gh pr view "$branch" --json url -q .url 2>/dev/null); then
            url=$(gh pr create \
              --base main --head "$branch" \
              --title "chore(release): Homebrew formula → ${tag}" \
              --body "$body")
          fi
          echo "bump PR: $url"

          # Try to enable auto-merge. Harmless if it can't (no PAT / checks
          # never run): the PR stays open for a manual merge.
          gh pr merge "$branch" --auto --squash || \
            echo "auto-merge not enabled (likely no HOMEBREW_BUMP_TOKEN); merge the PR manually"
