name: CI

on:
  push:
    branches: [main, rebuild]
  pull_request:

jobs:
  go:
    name: lint + test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          files=$(gofumpt -l .)
          if [ -n "$files" ]; then
            echo "gofumpt: the following files need formatting:"
            echo "$files"
            exit 1
          fi
      - name: test
        run: go test ./... -race
