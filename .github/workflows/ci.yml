name: CI

on:
  push:
    branches: [main, rebuild]
  pull_request:

jobs:
  go:
    name: lint + test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # The dash UI bundles are generated, not committed (TASK-121); regenerate
      # them before any Go compile so the go:embed in internal/dashapi resolves.
      - name: build dash UI
        run: bash scripts/build-dash-ui.sh
      - name: go vet
        run: go vet ./...
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          files=$(gofumpt -l .)
          if [ -n "$files" ]; then
            echo "gofumpt: the following files need formatting:"
            echo "$files"
            exit 1
          fi
      - name: test
        run: go test ./... -race
      - name: e2e (M2 DoD — tests/e2e/m2-acceptance.md)
        run: go test -tags e2e -count=1 ./tests/e2e/
