name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: lint + test (Go)
    runs-on: ubuntu-24.04
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # The action runs golangci-lint against the repo at its
          # default scope, picking up .golangci.yml. Functionally
          # equivalent to `make lint-go`, so we drop lint-go from the
          # make invocation below. The action handles install +
          # checksum + caching, which the prior curl|sh approach
          # couldn't do reliably (release-asset SHA drift).

      - name: install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: make lint-nilaway test-go
        run: make lint-nilaway test-go

      - name: make install smoke (verify ldflags + version surface)
        run: |
          make install
          set -e
          OUT_SEXTANT=$("$HOME/.local/bin/sextant" version)
          OUT_SEXTANTD=$("$HOME/.local/bin/sextantd" version)
          echo "sextant version  -> $OUT_SEXTANT"
          echo "sextantd version -> $OUT_SEXTANTD"
          # Output must contain the VERSION-file content (not the "dev"
          # fallback) — proves ldflags landed via `make install`.
          VERSION=$(cat VERSION)
          for o in "$OUT_SEXTANT" "$OUT_SEXTANTD"; do
            case "$o" in
              "$VERSION"*) ;;
              *) echo "::error::expected output to start with '$VERSION', got '$o'"; exit 1 ;;
            esac
          done

      # govulncheck runs as advisory (continue-on-error) because as of
      # 2026-05-28 two known docker/docker findings (GO-2026-4887,
      # GO-2026-4883) have "Fixed in: N/A" — we can't bump out of them
      # until upstream patches. Module-level findings in golang.org/x/*
      # will land via Dependabot. Flip to blocking once the docker
      # findings are resolved upstream.
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck (advisory)
        continue-on-error: true
        run: govulncheck ./...

  ts:
    name: lint + test (TypeScript)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install nats-server
        run: |
          NATS_VERSION=2.14.1
          curl -fsSL "https://github.com/nats-io/nats-server/releases/download/v${NATS_VERSION}/nats-server-v${NATS_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv "/tmp/nats-server-v${NATS_VERSION}-linux-amd64/nats-server" /usr/local/bin/nats-server
          nats-server --version

      - name: npm ci (workspace root)
        run: npm ci

      - name: npm audit (workspace root, high-severity gate)
        run: npm audit --audit-level=high

      - name: npm run codegen (verify in sync)
        working-directory: clients/typescript
        run: |
          npm run codegen
          if ! git diff --exit-code src/types.generated.ts; then
            echo "::error::src/types.generated.ts is out of sync with pkg/sextantproto/schemas/; re-run 'cd clients/typescript && npm run codegen' and commit"
            exit 1
          fi

      - name: npm run lint (clients/typescript)
        working-directory: clients/typescript
        run: npm run lint

      - name: npm run build (clients/typescript)
        working-directory: clients/typescript
        run: npm run build

      - name: npm test (clients/typescript)
        working-directory: clients/typescript
        run: npm test

      - name: make lint-sidecar test-sidecar (entrypoint vitest)
        run: make lint-sidecar test-sidecar

  sidecar-image:
    name: sidecar image build + smoke
    runs-on: ubuntu-24.04
    # The Docker build pulls Go + Node + apt packages and can take a few
    # minutes; that's the trade for catching image regressions on every
    # PR. Plan: plans/bootstrap.md#M9.
    #
    # Single source of truth for what "the smoke passed" means lives in
    # images/sidecar/test.sh (also invoked locally via `make
    # sidecar-image-test`). CI just calls that — no inline shell that
    # could drift when the tool list changes.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: make sidecar-image-test (build + acceptance smoke)
        run: make sidecar-image-test
