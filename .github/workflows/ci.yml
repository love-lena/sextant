name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: lint + test (Go)
    runs-on: ubuntu-24.04
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: make lint-go lint-nilaway test-go
        run: make lint-go lint-nilaway test-go

  ts:
    name: lint + test (TypeScript)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: install nats-server
        run: |
          NATS_VERSION=2.14.1
          curl -fsSL "https://github.com/nats-io/nats-server/releases/download/v${NATS_VERSION}/nats-server-v${NATS_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv "/tmp/nats-server-v${NATS_VERSION}-linux-amd64/nats-server" /usr/local/bin/nats-server
          nats-server --version

      - name: npm ci
        working-directory: clients/typescript
        run: npm ci

      - name: npm run codegen (verify in sync)
        working-directory: clients/typescript
        run: |
          npm run codegen
          if ! git diff --exit-code src/types.generated.ts; then
            echo "::error::src/types.generated.ts is out of sync with pkg/sextantproto/schemas/; re-run 'cd clients/typescript && npm run codegen' and commit"
            exit 1
          fi

      - name: npm run lint
        working-directory: clients/typescript
        run: npm run lint

      - name: npm run build
        working-directory: clients/typescript
        run: npm run build

      - name: npm test
        working-directory: clients/typescript
        run: npm test

  sidecar-image:
    name: sidecar image build + smoke
    runs-on: ubuntu-24.04
    # The Docker build pulls Go + Node + apt packages and can take a few
    # minutes; that's the trade for catching image regressions on every
    # PR. Plan: plans/bootstrap.md#M9.
    #
    # Single source of truth for what "the smoke passed" means lives in
    # images/sidecar/test.sh (also invoked locally via `make
    # sidecar-image-test`). CI just calls that — no inline shell that
    # could drift when the tool list changes.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: make sidecar-image-test (build + acceptance smoke)
        run: make sidecar-image-test
