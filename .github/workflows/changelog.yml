name: changelog

# Gate PRs that touch bump-required paths so they MUST also include a
# CHANGELOG.md edit. The path scope mirrors CLAUDE.md § "Versioning + PR
# policy" — keep them in sync when you change either.
#
# Best-effort: catches "you forgot to update the changelog." It can't
# validate the classification (Added vs Fixed vs ...) — that's still the
# author's call, audited at review time.

on:
  pull_request:
    branches: [main]

jobs:
  changelog-required:
    name: changelog entry required
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: enforce CHANGELOG.md updated when bump-required paths change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Files changed in this PR.
          mapfile -t changed < <(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")

          # Bump-required paths (mirror CLAUDE.md § Versioning + PR policy).
          # Format: extended regex matched against each changed file.
          BUMP_RE='^(cmd/|pkg/|images/|clients/|Makefile$|go\.mod$|go\.sum$|VERSION$)'

          # Exemptions inside bump-required paths:
          #   - Pure test files (*_test.go) don't ship.
          #   - Markdown files inside pkg/ (rare but possible) are docs.
          EXEMPT_RE='(_test\.go$|\.md$)'

          # Filter the changed list.
          triggers=()
          for f in "${changed[@]}"; do
            if [[ "$f" =~ $BUMP_RE ]] && [[ ! "$f" =~ $EXEMPT_RE ]]; then
              triggers+=("$f")
            fi
          done

          if [ "${#triggers[@]}" -eq 0 ]; then
            echo "No bump-required paths changed. Changelog not required."
            exit 0
          fi

          echo "Bump-required paths changed:"
          printf '  %s\n' "${triggers[@]}"

          # Was CHANGELOG.md changed?
          if printf '%s\n' "${changed[@]}" | grep -qx 'CHANGELOG.md'; then
            echo
            echo "CHANGELOG.md was updated. ✓"
            exit 0
          fi

          echo
          echo "::error::CHANGELOG.md was NOT updated, but bump-required files changed."
          echo "Add an entry under '## [Unreleased]' in CHANGELOG.md."
          echo "See CLAUDE.md § 'Versioning + PR policy' for the rule."
          exit 1
