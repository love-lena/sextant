name: dependency-review

# Flags new GHSA-known vulnerable deps on PRs.
# Cheap (~5s), no setup, catches supply-chain regressions at PR time.
# https://github.com/actions/dependency-review-action

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          # Fail the job on `high` or `critical` GHSA advisories. Lower
          # severities surface as warnings but don't block the PR.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
