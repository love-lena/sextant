[book]
title = "Sextant — Reference"
authors = ["sextant maintainers"]
description = "Operator and developer reference for Sextant — the protocol and SDK."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/love-lena/sextant"
edit-url-template = "https://github.com/love-lena/sextant/edit/main/docs/book/{path}"
no-section-label = false
mathjax-support = false

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true
