<text x="640" y="30" font-size="26" text-anchor="middle" fill="#1e1e1e" font-weight="700">Sextant — High-Level Architecture</text>
<text x="640" y="156" font-size="15" text-anchor="middle" fill="#1e1e1e" font-weight="600">CLIENTS  —  build on the SDK &amp; implement conventions; run anywhere</text>
<text x="640" y="315" font-size="14.5" text-anchor="middle" fill="#1e1e1e" font-weight="600">SEXTANT CONVENTIONS  —  opinionated · owned · OPTIONAL   (built on the primitives, not core)</text>
<text x="640" y="430" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="600">clients ↔ bus, through the SDK:   pub/sub · read &amp; write artifacts</text>
<text x="640" y="492" font-size="16" text-anchor="middle" fill="#1e1e1e" font-weight="600">THE BUS (NATS) · CORE  —  `sextant up`, or any NATS you point the SDK at</text>
<text x="640" y="760" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="600">TWO PRIMITIVES (core)        ·        reserved  sx.  namespace (system subjects + buckets)</text>
<text x="640" y="850" font-size="13.5" text-anchor="middle" fill="#1e1e1e" font-weight="600">CORE (required):  the bus · two primitives · SDK · wire.        Everything above is built on top — optional &amp; forkable.</text>
<text x="640" y="876" font-size="12.5" text-anchor="middle" fill="#1e1e1e" font-weight="600">Sextant ships forkable reference clients (Dispatcher · Workflow coordinator · Monitor · Human UI); bring your own, like the harness.</text>
</svg>
